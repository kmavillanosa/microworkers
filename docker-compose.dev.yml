# Dev. Run: docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
# API uses api/.env.dev; MySQL and build args use .env.dev (root).
# Includes web-studio and reels-generator.

name: microworkers-dev

services:
  mysql:
    image: mysql:8.0
    container_name: microworkers-dev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./api/mysql-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: microworkers-dev-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: microworkers-dev-api
    env_file:
      - ./api/.env.dev
    environment:
      NODE_ENV: development
      PORT: 3000
      REPO_ROOT: /app/data
      REELS_PYTHON_EXE: /usr/bin/python3
      REELS_PYTHON_VERBOSE: "1"
      REELS_MAX_CONCURRENT_JOBS: ${REELS_MAX_CONCURRENT_JOBS}
      REELS_RUN_IN_PROCESS: "false"
      TYPEORM_DATABASE_HOST: mysql
      TYPEORM_DATABASE_PORT: ${TYPEORM_DATABASE_PORT}
      TYPEORM_DATABASE_USERNAME: ${TYPEORM_DATABASE_USERNAME}
      TYPEORM_DATABASE_PASSWORD: ${TYPEORM_DATABASE_PASSWORD}
      TYPEORM_DATABASE_NAME: ${TYPEORM_DATABASE_NAME}
      CORS_ORIGINS: ${CORS_ORIGINS}
      WORKER_SECRET: ${WORKER_SECRET:-}
      STUDIO_JWT_SECRET: ${STUDIO_JWT_SECRET:-}
      STUDIO_JWT_EXPIRES_IN: ${STUDIO_JWT_EXPIRES_IN:-7d}
      SLACK_ORDER_WEBHOOK_URL: ${SLACK_ORDER_WEBHOOK_URL}
    ports:
      - "3010:3000"
    volumes:
      - .:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://reelagad.com}
        VITE_APP_ENV: ${VITE_APP_ENV}
    container_name: microworkers-dev-web
    ports:
      - "5175:80"
    restart: unless-stopped

  web-studio:
    build:
      context: ./web-studio
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL_STUDIO:-${VITE_API_BASE_URL:-https://reelagad.com}}
        VITE_APP_ENV: ${VITE_APP_ENV}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: microworkers-dev-web-studio
    ports:
      - "5177:80"
    depends_on:
      - api
    restart: unless-stopped

  web-orders:
    build:
      context: ./web-orders
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL_WEB_ORDERS}
        VITE_PAYMONGO_ENABLED: ${VITE_PAYMONGO_ENABLED}
        VITE_APP_ENV: ${VITE_APP_ENV}
    container_name: microworkers-dev-web-orders
    ports:
      - "5176:80"
    depends_on:
      - api
    restart: unless-stopped

  reels-generator:
    build:
      context: .
      dockerfile: workers/reels-generator/Dockerfile
    container_name: microworkers-dev-reels-generator
    environment:
      VPS_API_URL: ${VPS_API_URL:-http://api:3000}
      API_BASE_URL: ${VPS_API_URL:-http://api:3000}
      REPO_ROOT: /data
      REELS_PYTHON_EXE: /usr/bin/python3
      REELS_PYTHON_VERBOSE: "1"
      WORKER_VERBOSE: "1"
      WORKER_SECRET: ${WORKER_SECRET:-}
    volumes:
      - .:/data
    depends_on:
      - api
    restart: unless-stopped

  samba:
    image: dperson/samba
    container_name: microworkers-dev-samba
    profiles:
      - share
    ports:
      - "139:139"
      - "445:445"
    environment:
      SHARE: "microworkers;/data;yes;no;no;${SAMBA_USER}"
      USER: "${SAMBA_USER};${SAMBA_PASSWORD}"
      WORKGROUP: "${SAMBA_WORKGROUP}"
      PERMISSIONS: "1"
    volumes:
      - .:/data
    restart: unless-stopped

volumes:
  mysql_data_dev:
