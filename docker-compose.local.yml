# Local. Run: docker compose -f docker-compose.local.yml --env-file .env.local up -d
# Includes transcription service (optional: set RUN_TRANSCRIPTION_IN_API=false in api/.env.local to use it)
# and reels-generator (placeholder until API job queue is added). Web-studio backoffice + heavy processing run here.

services:
  mysql:
    image: mysql:8.0
    container_name: microworkers-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./api/mysql-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: microworkers-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: microworkers-api
    env_file:
      - ./api/.env.local
    environment:
      NODE_ENV: development
      PORT: 3000
      SSL_CERT_PATH: ""
      SSL_KEY_PATH: ""
      REPO_ROOT: /app/data
      REELS_PYTHON_EXE: /usr/bin/python3
      REELS_PYTHON_VERBOSE: "1"
      REELS_RUN_IN_PROCESS: "false"
      REELS_MAX_CONCURRENT_JOBS: ${REELS_MAX_CONCURRENT_JOBS}
      TYPEORM_DATABASE_HOST: mysql
      TYPEORM_DATABASE_PORT: ${TYPEORM_DATABASE_PORT}
      TYPEORM_DATABASE_USERNAME: ${TYPEORM_DATABASE_USERNAME}
      TYPEORM_DATABASE_PASSWORD: ${TYPEORM_DATABASE_PASSWORD}
      TYPEORM_DATABASE_NAME: ${TYPEORM_DATABASE_NAME}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SLACK_ORDER_WEBHOOK_URL: ${SLACK_ORDER_WEBHOOK_URL}
    ports:
      - "3010:3000"
    volumes:
      - .:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', 'require("http").get("http://localhost:3000/api/orders/pricing",r=>{r.on("data",()=>{});r.on("end",()=>process.exit(r.statusCode===200?0:1));}).on("error",()=>process.exit(1));']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web-studio:
    build:
      context: ./web-studio
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://reelagad.com}
        VITE_APP_ENV: ${VITE_APP_ENV:-local}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: microworkers-web-studio
    ports:
      - "5175:80"
    restart: unless-stopped

  web-orders:
    build:
      context: ./web-orders
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL_WEB_ORDERS:-${VITE_API_BASE_URL:-https://localhost:3010}}
        VITE_PAYMONGO_ENABLED: ${VITE_PAYMONGO_ENABLED:-true}
        VITE_APP_ENV: ${VITE_APP_ENV:-local}
    container_name: microworkers-web-orders
    ports:
      - "5176:80"
    depends_on:
      - api
    restart: unless-stopped

  transcription:
    build:
      context: .
      dockerfile: workers/transcription/Dockerfile
    container_name: microworkers-transcription
    environment:
      REPO_ROOT: /data
      REELS_PYTHON_EXE: /usr/bin/python3
      TYPEORM_DATABASE_HOST: mysql
      TYPEORM_DATABASE_PORT: ${TYPEORM_DATABASE_PORT}
      TYPEORM_DATABASE_USERNAME: ${TYPEORM_DATABASE_USERNAME}
      TYPEORM_DATABASE_PASSWORD: ${TYPEORM_DATABASE_PASSWORD}
      TYPEORM_DATABASE_NAME: ${TYPEORM_DATABASE_NAME}
    volumes:
      - .:/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Polls VPS_API_URL for queued reel jobs, runs video generation locally, uploads result to same API.
  # Set VPS_API_URL in .env.local. Use https://reelagad.com when API is behind nginx (recommended);
  # or http://api:3000 when running in same Docker network as api service.
  # Local workers profile runs a single generator instance.
  reels-generator:
    build:
      context: .
      dockerfile: workers/reels-generator/Dockerfile
    container_name: microworkers-reels-generator
    environment:
      VPS_API_URL: ${VPS_API_URL:-https://reelagad.com}
      API_BASE_URL: ${VPS_API_URL:-https://reelagad.com}
      REPO_ROOT: /data
      REELS_PYTHON_EXE: /usr/bin/python3
      REELS_PYTHON_VERBOSE: "1"
      WORKER_VERBOSE: "1"
      WORKER_SECRET: ${WORKER_SECRET:-}
    volumes:
      - .:/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - workers

  samba:
    image: dperson/samba
    container_name: microworkers-samba
    profiles:
      - share
    ports:
      - "139:139"
      - "445:445"
    environment:
      SHARE: "microworkers;/data;yes;no;no;${SAMBA_USER}"
      USER: "${SAMBA_USER};${SAMBA_PASSWORD}"
      WORKGROUP: "${SAMBA_WORKGROUP}"
      PERMISSIONS: "1"
    volumes:
      - .:/data
    restart: unless-stopped

volumes:
  mysql_data:
