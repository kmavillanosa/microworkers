# Optional: redirect HTTP to HTTPS (uncomment when using real certs and want HTTP→HTTPS)
# server {
#     listen 80;
#     server_name reelagad.com www.reelagad.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name reelagad.com www.reelagad.com localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Relative paths on this domain (e.g. fetch('/api/...'), /media/...) hit same origin; proxy to API.
    # API container serves HTTPS (self-signed)
    location /api/ {
        proxy_pass https://api:3000/api/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 256M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 300s;
    }

    # Media (order-clips, clips, fonts, output) served by API
    location /media/ {
        proxy_pass https://api:3000/media/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri /index.html;
    }
}

# HTTPS — API and frontend. Uses /etc/nginx/ssl (self-signed in image; mount real certs in prod)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name reelagad.com www.reelagad.com localhost;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Relative paths on this domain (e.g. fetch('/api/...'), /media/...) hit same origin; proxy to API.
    location /api/ {
        proxy_pass https://api:3000/api/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 256M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 300s;
    }

    # Media (order-clips, clips, fonts, output) served by API
    location /media/ {
        proxy_pass https://api:3000/media/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri /index.html;
    }
}