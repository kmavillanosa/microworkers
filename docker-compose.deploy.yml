# CI/CD deploy target: API + web-orders + transcription (no web backoffice, no reels generator).
# Run: docker compose -f docker-compose.deploy.yml --env-file .env.prod up -d
# Transcription runs as a separate service (online). Video generation stays in API or run reels-generator locally.

name: microworkers-deploy

services:
  mysql:
    image: mysql:8.0
    container_name: microworkers-deploy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data_deploy:/var/lib/mysql
      - ./api/mysql-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    ports:
      - "3307:3306"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: microworkers-deploy-api
    environment:
      NODE_ENV: production
      PORT: 3000
      REPO_ROOT: /app/data
      REELS_PYTHON_EXE: /usr/bin/python3
      REELS_PYTHON_VERBOSE: "0"
      REELS_PYTHON_VERBOSE: "0"
      REELS_MAX_CONCURRENT_JOBS: ${REELS_MAX_CONCURRENT_JOBS}
      REELS_RUN_IN_PROCESS: "false"
      RUN_TRANSCRIPTION_IN_API: "false"
      TYPEORM_DATABASE_HOST: mysql
      TYPEORM_DATABASE_PORT: ${TYPEORM_DATABASE_PORT}
      TYPEORM_DATABASE_USERNAME: ${TYPEORM_DATABASE_USERNAME}
      TYPEORM_DATABASE_PASSWORD: ${TYPEORM_DATABASE_PASSWORD}
      TYPEORM_DATABASE_NAME: ${TYPEORM_DATABASE_NAME}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PAYMONGO_SECRET_KEY: ${PAYMONGO_SECRET_KEY}
      WORKER_SECRET: ${WORKER_SECRET}
    ports:
      - "3010:3000"
    volumes:
      - .:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  web-orders:
    build:
      context: ./web-orders
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL_WEB_ORDERS}
        VITE_PAYMONGO_ENABLED: ${VITE_PAYMONGO_ENABLED}
        VITE_APP_ENV: ${VITE_APP_ENV}
    container_name: microworkers-deploy-web-orders
    ports:
      - "8443:80"
    depends_on:
      - api
    restart: always

  transcription:
    build:
      context: .
      dockerfile: workers/transcription/Dockerfile
    container_name: microworkers-deploy-transcription
    environment:
      REPO_ROOT: /data
      REELS_PYTHON_EXE: /usr/bin/python3
      TYPEORM_DATABASE_HOST: mysql
      TYPEORM_DATABASE_PORT: ${TYPEORM_DATABASE_PORT}
      TYPEORM_DATABASE_USERNAME: ${TYPEORM_DATABASE_USERNAME}
      TYPEORM_DATABASE_PASSWORD: ${TYPEORM_DATABASE_PASSWORD}
      TYPEORM_DATABASE_NAME: ${TYPEORM_DATABASE_NAME}
    volumes:
      - .:/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

volumes:
  mysql_data_deploy:
