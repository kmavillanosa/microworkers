# Deploy microworkers to VPS.
# Separate stages: API first (rebuild only if api/ or related paths changed), then web-orders (rebuild only if web-orders/ changed).
# Required secrets: VPS_SSH_KEY, MYSQL_*, TYPEORM_*, CORS_ORIGINS, VITE_API_BASE_URL_WEB_ORDERS, etc.

name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web_orders: ${{ steps.filter.outputs.web_orders }}
      transcription: ${{ steps.filter.outputs.transcription }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'requirements.txt'
              - 'assets/**'
              - 'docker-compose.deploy.yml'
            web_orders:
              - 'web-orders/**'
            transcription:
              - 'workers/transcription/**'
              - 'transcribe_clip.py'

  deploy:
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to VPS (API first, then web-orders)
        env:
          API_CHANGED: ${{ needs.detect-changes.outputs.api }}
          WEB_ORDERS_CHANGED: ${{ needs.detect-changes.outputs.web_orders }}
          TRANSCRIPTION_CHANGED: ${{ needs.detect-changes.outputs.transcription }}
        run: |
          VPS_HOST="88.222.245.88"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=90 -o ConnectionAttempts=5 -o ServerAliveInterval=15 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes"
          MAX_ATTEMPTS=5
          echo "Waiting for stable SSH handshake..."
          for probe in $(seq 1 10); do
            if ssh $SSH_OPTS root@$VPS_HOST "echo ok"; then
              echo "SSH handshake OK (probe $probe)."
              break
            fi
            [ $probe -eq 10 ] && { echo "SSH handshake failed after 10 probes."; exit 1; }
            echo "Probe $probe failed, retrying in 15s..."
            sleep 15
          done
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt of $MAX_ATTEMPTS..."
            if ssh $SSH_OPTS root@$VPS_HOST "API_CHANGED=$API_CHANGED WEB_ORDERS_CHANGED=$WEB_ORDERS_CHANGED TRANSCRIPTION_CHANGED=$TRANSCRIPTION_CHANGED bash -s" << 'REMOTE'
          set -e
          if [ ! -d "/microworkers/.git" ]; then
            git clone https://github.com/${{ github.repository }}.git /microworkers
          else
            cd /microworkers
            git fetch origin
            git checkout -f main
            git pull origin main
          fi

          cd /microworkers

          mkdir -p assets/game-clips assets/order-clips assets/db assets/credentials \
            assets/cache/images assets/voices/piper output scripts
          [ -d assets/fonts ] || mkdir -p assets/fonts
          chown -R 1000:1000 assets output scripts

          export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
          export MYSQL_DATABASE="${{ secrets.MYSQL_DATABASE }}"
          export MYSQL_USER="${{ secrets.MYSQL_USER }}"
          export MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}"
          export TYPEORM_DATABASE_PORT="${{ secrets.TYPEORM_DATABASE_PORT }}"
          export TYPEORM_DATABASE_USERNAME="${{ secrets.TYPEORM_DATABASE_USERNAME }}"
          export TYPEORM_DATABASE_PASSWORD="${{ secrets.TYPEORM_DATABASE_PASSWORD }}"
          export TYPEORM_DATABASE_NAME="${{ secrets.TYPEORM_DATABASE_NAME }}"
          export CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}"
          export VITE_API_BASE_URL_WEB_ORDERS="${{ secrets.VITE_API_BASE_URL_WEB_ORDERS }}"
          export VITE_PAYMONGO_ENABLED="${{ secrets.VITE_PAYMONGO_ENABLED }}"
          export VITE_APP_ENV="${{ secrets.VITE_APP_ENV }}"
          export REELS_MAX_CONCURRENT_JOBS="${{ secrets.REELS_MAX_CONCURRENT_JOBS }}"
          export PAYMONGO_SECRET_KEY="${{ secrets.PAYMONGO_SECRET_KEY }}"
          export WORKER_SECRET="${{ secrets.WORKER_SECRET }}"

          # Build only what changed or is missing (transcription image is slow; rebuild only when transcription files change)
          BUILD_API=false
          BUILD_WEB_ORDERS=false
          BUILD_TRANSCRIPTION=false
          if [ "$API_CHANGED" = "true" ] || ! docker image inspect microworkers-deploy-api 2>/dev/null; then
            BUILD_API=true
          fi
          if [ "$WEB_ORDERS_CHANGED" = "true" ] || ! docker image inspect microworkers-deploy-web-orders 2>/dev/null; then
            BUILD_WEB_ORDERS=true
          fi
          if [ "$TRANSCRIPTION_CHANGED" = "true" ] || ! docker image inspect microworkers-deploy-transcription 2>/dev/null; then
            BUILD_TRANSCRIPTION=true
          fi

          # Stage 1: API. Rebuild only if API changed or missing.
          # --progress=plain streams full build output (npm, tsc, nest) for verbose logging
          if [ "$BUILD_API" = "true" ]; then
            echo "--- Building and deploying API ---"
            docker compose -f docker-compose.deploy.yml build --progress=plain api
            docker compose -f docker-compose.deploy.yml up -d mysql
            docker compose -f docker-compose.deploy.yml up -d api
          else
            echo "--- Skipping API (no changes) ---"
          fi

          # Transcription: rebuild only when transcription files changed or image missing (avoids long pip install on every deploy)
          if [ "$BUILD_TRANSCRIPTION" = "true" ]; then
            echo "--- Building and deploying transcription ---"
            docker compose -f docker-compose.deploy.yml build --progress=plain transcription
            docker compose -f docker-compose.deploy.yml up -d transcription
          else
            echo "--- Skipping transcription (no changes, reusing existing image) ---"
            docker compose -f docker-compose.deploy.yml up -d transcription
          fi

          # Stage 2: Web-orders. Rebuild only if web-orders changed or missing.
          if [ "$BUILD_WEB_ORDERS" = "true" ]; then
            echo "--- Building and deploying web-orders ---"
            docker compose -f docker-compose.deploy.yml build --progress=plain web-orders
            docker compose -f docker-compose.deploy.yml up -d web-orders
          else
            echo "--- Skipping web-orders (no changes) ---"
          fi

          # Ensure full stack is up (start any stopped services)
          docker compose -f docker-compose.deploy.yml up -d
          REMOTE
            then
              echo "Deploy completed successfully."
              exit 0
            fi
            [ $attempt -lt $MAX_ATTEMPTS ] && echo "SSH failed; retrying in 30s..." && sleep 30
          done
          echo "All deploy attempts failed (e.g. connection or handshake unstable). Check VPS is up and reachable."
          exit 1